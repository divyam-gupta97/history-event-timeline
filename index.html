<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>History Event Timeline</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    select, input, textarea, button {
      padding: 6px;
      margin: 4px;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      height: 80px;
    }

    .small-btn {
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      margin-left: 4px;
    }

    .black-btn {
      background: black;
      color: white;
    }

    .event-box {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .year {
      font-weight: bold;
      font-size: 18px;
    }

    .details {
      margin-top: 6px;
      padding-left: 18px;
    }

    .timeline {
      border-left: 3px solid #444;
      padding-left: 15px;
      margin-top: 20px;
    }

    .mode-toggle {
      float: right;
      font-size: 12px;
      cursor: pointer;
    }

    .summary-box {
      background: #fff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

  </style>
</head>
<body>

<header>
  History Event Timeline
  <span class="mode-toggle">
    Mode:
    <button class="small-btn" onclick="setMode('compact')">Compact</button>
    <button class="small-btn" onclick="setMode('detailed')">Detailed</button>
  </span>
</header>

<div class="container">

  <h3>Add Event</h3>

  <select id="chapter">
    <option value="india">India</option>
    <option value="europe">Europe</option>
    <option value="print">Print</option>
  </select>

  <input type="number" id="year" placeholder="Year">
  <input type="text" id="title" placeholder="Event Title">

  <div id="detailsSection" style="display:none;">
    <textarea id="details" placeholder="Enter bullet points (one per line)"></textarea>
  </div>

  <button onclick="addEvent()">Add Event</button>

  <hr>

  <h3>AI Summary (Year Range)</h3>

  <input type="number" id="startYear" placeholder="Start Year">
  <input type="number" id="endYear" placeholder="End Year">
  <button onclick="generateSummary()">Generate Summary</button>

  <div id="summary" class="summary-box"></div>

  <hr>

  <div class="timeline" id="timeline"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "event-timeline-6a6b5.firebaseapp.com",
  projectId: "event-timeline-6a6b5",
  storageBucket: "event-timeline-6a6b5.appspot.com",
  messagingSenderId: "253986913727",
  appId: "1:253986913727:web:14a667c11c37b5c226f50a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mode = "compact";

window.setMode = function(selected) {
  mode = selected;
  document.getElementById("detailsSection").style.display =
    mode === "detailed" ? "block" : "none";
};

window.addEvent = async function() {
  const chapter = document.getElementById("chapter").value;
  const year = parseInt(document.getElementById("year").value);
  const title = document.getElementById("title").value;
  const detailsRaw = document.getElementById("details").value;

  if (!year || !title) return alert("Enter year and title");

  const details = detailsRaw
    ? detailsRaw.split("\n").filter(line => line.trim() !== "")
    : [];

  await addDoc(collection(db, chapter), {
    year,
    title,
    details
  });

  alert("Event Added");
  loadEvents();
};

async function loadEvents() {
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  const chapters = ["india", "europe", "print"];

  for (let chapter of chapters) {
    const snapshot = await getDocs(collection(db, chapter));

    snapshot.docs
      .map(doc => doc.data())
      .sort((a, b) => a.year - b.year)
      .forEach(event => {

        const box = document.createElement("div");
        box.className = "event-box";

        box.innerHTML = `
          <div class="year">${event.year} - ${event.title}</div>
          <button class="small-btn black-btn" onclick="toggleDetails(this)">Show Details</button>
          <div class="details" style="display:none;">
            ${
              event.details && event.details.length
              ? "<ul>" + event.details.map(d => `<li>${d}</li>`).join("") + "</ul>"
              : "No details"
            }
          </div>
        `;

        timeline.appendChild(box);
      });
  }
}

window.toggleDetails = function(button) {
  const details = button.nextElementSibling;
  if (details.style.display === "none") {
    details.style.display = "block";
    button.innerText = "Hide Details";
  } else {
    details.style.display = "none";
    button.innerText = "Show Details";
  }
};

window.generateSummary = async function() {
  const start = parseInt(document.getElementById("startYear").value);
  const end = parseInt(document.getElementById("endYear").value);

  if (!start || !end) return alert("Enter both years");

  const snapshot = await getDocs(collection(db, "india"));
  let textData = "";

  snapshot.docs
    .map(doc => doc.data())
    .filter(event => event.year >= start && event.year <= end)
    .forEach(event => {
      textData += `${event.year} - ${event.title}. `;
      if (event.details) {
        event.details.forEach(d => textData += d + ". ");
      }
    });

  if (!textData) return alert("No events in this range");

  const response = await fetch("/api/summary", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: textData })
  });

  const data = await response.json();
  document.getElementById("summary").innerText = data.summary;
};

loadEvents();

</script>

</body>
</html>

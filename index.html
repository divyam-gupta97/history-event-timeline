<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>History Event Timeline</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #eef2f7;
}

header {
  background: linear-gradient(90deg, #1f2937, #111827);
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  letter-spacing: 1px;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.chapter-section {
  margin-top: 50px;
}

.chapter-title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
}

.timeline {
  border-left: 5px solid #333;
  padding-left: 25px;
  position: relative;
}

.event-box {
  background: white;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  position: relative;
}

.event-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  position: absolute;
  left: -32px;
  top: 22px;
}

.year {
  font-weight: bold;
  font-size: 18px;
}

.details {
  margin-top: 10px;
  padding-left: 18px;
}

button {
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  margin-left: 6px;
}

.black-btn {
  background: black;
  color: white;
}

input, select, textarea {
  padding: 6px;
  font-size: 13px;
  margin: 4px;
}

textarea {
  width: 100%;
  height: 80px;
}

.mode-toggle {
  float: right;
  font-size: 12px;
}

.summary-box {
  background: white;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<header>
  History Event Timeline
  <span class="mode-toggle">
    Mode:
    <button onclick="setMode('compact')">Compact</button>
    <button onclick="setMode('detailed')">Detailed</button>
  </span>
</header>

<div class="container">

<h3>Add Event</h3>

<select id="chapter">
  <option value="india">India</option>
  <option value="europe">Europe</option>
  <option value="print">Print</option>
</select>

<input type="number" id="year" placeholder="Year">
<input type="text" id="title" placeholder="Event Title">
<input type="color" id="color" value="#000000">

<div id="detailsSection" style="display:none;">
  <textarea id="details" placeholder="Enter bullet points (one per line)"></textarea>
</div>

<button onclick="addEvent()">Add Event</button>

<hr>

<h3>AI Summary (Year Range)</h3>
<input type="number" id="startYear" placeholder="Start Year">
<input type="number" id="endYear" placeholder="End Year">
<button onclick="generateSummary()">Generate Summary</button>

<div id="summary" class="summary-box"></div>

<!-- INDIA -->
<div class="chapter-section">
  <div class="chapter-title" style="color:#b91c1c;">India</div>
  <div class="timeline" id="indiaTimeline" style="border-color:#b91c1c;"></div>
</div>

<!-- EUROPE -->
<div class="chapter-section">
  <div class="chapter-title" style="color:#1d4ed8;">Europe</div>
  <div class="timeline" id="europeTimeline" style="border-color:#1d4ed8;"></div>
</div>

<!-- PRINT -->
<div class="chapter-section">
  <div class="chapter-title" style="color:#15803d;">Print</div>
  <div class="timeline" id="printTimeline" style="border-color:#15803d;"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "event-timeline-6a6b5.firebaseapp.com",
  projectId: "event-timeline-6a6b5",
  storageBucket: "event-timeline-6a6b5.appspot.com",
  messagingSenderId: "253986913727",
  appId: "1:253986913727:web:14a667c11c37b5c226f50a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mode = "compact";

window.setMode = function(selected) {
  mode = selected;
  document.getElementById("detailsSection").style.display =
    mode === "detailed" ? "block" : "none";
};

window.addEvent = async function() {
  const chapter = document.getElementById("chapter").value;
  const year = parseInt(document.getElementById("year").value);
  const title = document.getElementById("title").value;
  const color = document.getElementById("color").value;
  const detailsRaw = document.getElementById("details").value;

  if (!year || !title) return alert("Enter year and title");

  const details = detailsRaw
    ? detailsRaw.split("\n").filter(line => line.trim() !== "")
    : [];

  await addDoc(collection(db, chapter), {
    year,
    title,
    details,
    color
  });

  alert("Event Added");
  loadEvents();
};

async function loadChapter(chapter) {
  const timeline = document.getElementById(chapter + "Timeline");
  timeline.innerHTML = "";

  const snapshot = await getDocs(collection(db, chapter));

  snapshot.docs
    .map(doc => doc.data())
    .sort((a,b) => a.year - b.year)
    .forEach(event => {

      const box = document.createElement("div");
      box.className = "event-box";

      box.innerHTML = `
        <div class="event-dot" style="background:${event.color || "#000"}"></div>
        <div class="year">${event.year} - ${event.title}</div>
        <button class="black-btn" onclick="toggleDetails(this)">Show Details</button>
        <div class="details" style="display:none;">
          ${
            event.details && event.details.length
            ? "<ul>" + event.details.map(d => `<li>${d}</li>`).join("") + "</ul>"
            : "No details"
          }
        </div>
      `;

      timeline.appendChild(box);
    });
}

window.toggleDetails = function(button) {
  const details = button.nextElementSibling;
  if (details.style.display === "none") {
    details.style.display = "block";
    button.innerText = "Hide Details";
  } else {
    details.style.display = "none";
    button.innerText = "Show Details";
  }
};

async function loadEvents() {
  await loadChapter("india");
  await loadChapter("europe");
  await loadChapter("print");
}

window.generateSummary = async function() {
  const start = parseInt(document.getElementById("startYear").value);
  const end = parseInt(document.getElementById("endYear").value);

  if (!start || !end) return alert("Enter both years");

  let combinedText = "";

  for (let chapter of ["india","europe","print"]) {
    const snapshot = await getDocs(collection(db, chapter));
    snapshot.docs
      .map(doc => doc.data())
      .filter(e => e.year >= start && e.year <= end)
      .forEach(e => {
        combinedText += `${e.year} - ${e.title}. `;
        if (e.details) e.details.forEach(d => combinedText += d + ". ");
      });
  }

  if (!combinedText) return alert("No events in this range");

  const response = await fetch("/api/summary", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text: combinedText })
  });

  const data = await response.json();
  document.getElementById("summary").innerText = data.summary;
};

loadEvents();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>History Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 20px;
      background: #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .tab.active {
      background: #2563eb;
      color: white;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    input, button {
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      border: none;
    }

    button.delete {
      background: #dc2626;
    }

    .timeline {
      border-left: 4px solid #2563eb;
      padding-left: 20px;
      margin-top: 20px;
    }

    .event {
      margin-bottom: 15px;
      padding: 10px;
      background: #f9fafb;
      border-radius: 8px;
      position: relative;
    }

    .event h4 {
      margin: 0;
    }

    .year {
      font-weight: bold;
      color: #555;
    }

    .actions {
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>History Timeline</header>

<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('europe')">Europe</div>
    <div class="tab" onclick="switchTab('india')">India</div>
    <div class="tab" onclick="switchTab('print')">Print</div>
  </div>

  <div class="card">
    <h3>Add Event</h3>
    <input type="text" id="eventName" placeholder="Event Name"><br>
    <input type="number" id="eventYear" placeholder="Year"><br>
    <input type="color" id="eventColor" value="#2563eb"><br>
    <button onclick="addEvent()">Add Event</button>
  </div>

  <div class="card">
    <h3>Timeline</h3>
    <div id="timeline" class="timeline"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUVXWDLRkPjzGR3dEFUwG60EX_2tzr96o",
  authDomain: "event-timeline-6a6b5.firebaseapp.com",
  projectId: "event-timeline-6a6b5",
  storageBucket: "event-timeline-6a6b5.firebasestorage.app",
  messagingSenderId: "253986913727",
  appId: "1:253986913727:web:14a667c11c37b5c226f50a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentChapter = "europe";

window.switchTab = function(chapter) {
  currentChapter = chapter;
  document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
  event.target.classList.add("active");
  loadEvents();
}

window.addEvent = async function() {
  const name = document.getElementById("eventName").value;
  const year = document.getElementById("eventYear").value;
  const color = document.getElementById("eventColor").value;

  if (!name || !year) return alert("Fill all fields");

  await addDoc(collection(db, currentChapter), {
    name: name,
    year: Number(year),
    color: color
  });

  document.getElementById("eventName").value = "";
  document.getElementById("eventYear").value = "";

  loadEvents();
}

async function loadEvents() {
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, currentChapter));

  let events = [];
  querySnapshot.forEach((docSnap) => {
    events.push({ id: docSnap.id, ...docSnap.data() });
  });

  events.sort((a,b) => a.year - b.year);

  events.forEach(eventData => {
    const div = document.createElement("div");
    div.className = "event";
    div.style.borderLeft = "6px solid " + eventData.color;

    div.innerHTML = `
      <h4>${eventData.name}</h4>
      <div class="year">${eventData.year}</div>
      <div class="actions">
        <button onclick="editEvent('${eventData.id}')">Edit</button>
        <button class="delete" onclick="deleteEvent('${eventData.id}')">Delete</button>
      </div>
    `;

    timeline.appendChild(div);
  });
}

window.deleteEvent = async function(id) {
  await deleteDoc(doc(db, currentChapter, id));
  loadEvents();
}

window.editEvent = async function(id) {
  const newName = prompt("New Event Name:");
  const newYear = prompt("New Year:");
  const newColor = prompt("New Color (hex code like #ff0000):");

  if (!newName || !newYear || !newColor) return;

  await updateDoc(doc(db, currentChapter, id), {
    name: newName,
    year: Number(newYear),
    color: newColor
  });

  loadEvents();
}

loadEvents();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>History Event Timeline</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #eef2f7;
}

header {
  background: linear-gradient(90deg, #1f2937, #111827);
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

select, input, textarea {
  padding: 6px;
  font-size: 13px;
  margin: 4px;
}

textarea {
  width: 100%;
  height: 80px;
}

button {
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  margin-left: 6px;
}

.black-btn {
  background: black;
  color: white;
}

.timeline {
  margin-top: 30px;
}

.event-wrapper {
  position: relative;
  margin-bottom: 25px;
  padding-left: 40px;
}

.event-line {
  position: absolute;
  left: 15px;
  top: 0;
  width: 6px;
  height: 100%;
  border-radius: 3px;
}

.event-box {
  background: white;
  padding: 14px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.event-index {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  color: white;
  margin-bottom: 6px;
}

.year-title {
  font-weight: bold;
  font-size: 17px;
}

.details {
  margin-top: 10px;
  padding-left: 18px;
}

.summary-box {
  background: white;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<header>History Event Timeline</header>

<div class="container">

<h3>Select Chapter</h3>
<select id="chapterSelector" onchange="loadEvents()">
  <option value="india">India</option>
  <option value="europe">Europe</option>
  <option value="print">Print</option>
</select>

<hr>

<h3>Add Event</h3>

<input type="number" id="year" placeholder="Year">
<input type="text" id="title" placeholder="Event Title">
<input type="color" id="color" value="#000000">

<textarea id="details" placeholder="Enter bullet points (one per line)"></textarea>

<button onclick="addEvent()">Add Event</button>

<hr>

<h3>AI Summary (Year Range)</h3>
<input type="number" id="startYear" placeholder="Start Year">
<input type="number" id="endYear" placeholder="End Year">
<button onclick="generateSummary()">Generate Summary</button>

<div id="summary" class="summary-box"></div>

<div class="timeline" id="timeline"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "event-timeline-6a6b5.firebaseapp.com",
  projectId: "event-timeline-6a6b5",
  storageBucket: "event-timeline-6a6b5.appspot.com",
  messagingSenderId: "253986913727",
  appId: "1:253986913727:web:14a667c11c37b5c226f50a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEvent = async function() {
  const chapter = document.getElementById("chapterSelector").value;
  const year = parseInt(document.getElementById("year").value);
  const title = document.getElementById("title").value;
  const color = document.getElementById("color").value;
  const detailsRaw = document.getElementById("details").value;

  if (!year || !title) return alert("Enter year and title");

  const details = detailsRaw
    ? detailsRaw.split("\n").filter(line => line.trim() !== "")
    : [];

  await addDoc(collection(db, chapter), {
    year,
    title,
    details,
    color
  });

  alert("Event Added");
  loadEvents();
};

window.toggleDetails = function(button) {
  const details = button.nextElementSibling;
  if (details.style.display === "none") {
    details.style.display = "block";
    button.innerText = "Hide Details";
  } else {
    details.style.display = "none";
    button.innerText = "Show Details";
  }
};

window.loadEvents = async function() {
  const chapter = document.getElementById("chapterSelector").value;
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  const snapshot = await getDocs(collection(db, chapter));

  snapshot.docs
    .map(doc => doc.data())
    .sort((a,b) => a.year - b.year)
    .forEach((event, index) => {

      const wrapper = document.createElement("div");
      wrapper.className = "event-wrapper";

      wrapper.innerHTML = `
        <div class="event-line" style="background:${event.color || "#000"}"></div>

        <div class="event-box">
          <div class="event-index" style="background:${event.color || "#000"}">
            Event ${index + 1}
          </div>

          <div class="year-title">
            ${event.year} — ${event.title}
          </div>

          <button class="black-btn" onclick="toggleDetails(this)">Show Details</button>

          <div class="details" style="display:none;">
            ${
              event.details && event.details.length
              ? "<ul>" + event.details.map(d => `<li>${d}</li>`).join("") + "</ul>"
              : "No details"
            }
          </div>
        </div>
      `;

      timeline.appendChild(wrapper);
    });
};

window.generateSummary = async function() {
  const start = parseInt(document.getElementById("startYear").value);
  const end = parseInt(document.getElementById("endYear").value);

  if (!start || !end) return alert("Enter both years");

  const chapter = document.getElementById("chapterSelector").value;
  const snapshot = await getDocs(collection(db, chapter));

  let combinedText = "";

  snapshot.docs
    .map(doc => doc.data())
    .filter(e => e.year >= start && e.year <= end)
    .forEach(e => {
      combinedText += `${e.year} - ${e.title}. `;
      if (e.details) e.details.forEach(d => combinedText += d + ". ");
    });

  if (!combinedText) return alert("No events in this range");

  const response = await fetch("/api/summary", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text: combinedText })
  });

  const data = await response.json();
  document.getElementById("summary").innerText = data.summary;
};

loadEvents();

</script>

</body>
</html>
